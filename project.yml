name: GPSChanger
options:
  bundleIdPrefix: com.erol
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 6.2
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.erol.GPSChanger
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  GPSChanger:
    type: application
    platform: macOS
    sources:
      - path: GPSChanger
    info:
      path: GPSChanger/Info.plist
      properties:
        CFBundleName: GPS Changer
        CFBundleDisplayName: GPS Changer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Erol"
        LSApplicationCategoryType: developer-tools
    entitlements:
      path: GPSChanger/GPSChanger.entitlements
    settings:
      base:
        PRODUCT_NAME: GPSChanger
